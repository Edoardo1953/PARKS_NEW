<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETOSHA | Mappa Interattiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/logo.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../shared/db.js"></script>
    <script src="../shared/app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="../shared/mobile_responsive.css?v=2.2">
    <style>
        :root { 
            --primary: #2d7a4d; 
            --accent: #ffab40; 
            --dark-bg: #0d1e1a;
            --glass: rgba(255, 255, 255, 0.05);
            --sidebar-width: 300px;
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Outfit', sans-serif; background: var(--dark-bg); color: white;
            /* overflow: hidden; */ /* Permetti lo scroll naturale */
        }

        .layout { display: flex; height: 100vh; width: 100vw; }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 100;
        }

        .sidebar-logo {
            width: 260px;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }
        .sidebar-logo img {
            width: 100%;
            height: auto;
            display: block;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .sidebar-menu li {
            padding: 15px 20px;
            margin-bottom: 8px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 600;
            transition: 0.3s;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .sidebar-menu li:hover, .sidebar-menu li.active {
            background: var(--glass);
            color: var(--accent);
        }

        .sidebar-menu li.active {
            background: rgba(255, 171, 64, 0.1);
            border: 1px solid rgba(255, 171, 64, 0.2);
        }

        .sidebar-menu li i { width: 20px; }

        .logout-btn {
            margin-top: auto;
            background: rgba(255, 82, 82, 0.1);
            color: #ff5252;
            border: 1px solid rgba(255, 82, 82, 0.2);
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 700;
            transition: 0.3s;
        }
        .logout-btn:hover { background: #ff5252; color: white; }

        /* MAIN CONTENT - MAP */
        .main-content {
            flex-grow: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header { 
            padding: 1rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(0,0,0,0.8); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            z-index: 50; 
        }

        .map-viewport { 
            flex-grow: 1;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
        }

        .map-canvas { position: relative; width: max-content; }
        .map-base { display: block; height: 85vh; width: auto; box-shadow: 0 0 100px rgba(0,0,0,0.8); }
        
        .marker { 
            position: absolute; 
            transform: translate(-50%, -100%); 
            width: 45px; height: 45px; 
            cursor: pointer; 
            transition: 0.2s; 
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6)); 
        }
        .marker:hover { transform: translate(-50%, -110%) scale(1.3); z-index: 100; }

        .tooltip { 
            position: absolute; 
            background: white; 
            color: black; 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: 800; 
            width: 240px; 
            display: none; 
            transform: translate(-50%, -140%); 
            z-index: 2000; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
            border-bottom: 6px solid var(--accent); 
        }
        .tooltip::after { 
            content: ''; 
            position: absolute; 
            bottom: -12px; 
            left: 50%; 
            transform: translateX(-50%); 
            border-left: 12px solid transparent; 
            border-right: 12px solid transparent; 
            border-top: 12px solid white; 
        }

        /* MOBILE ADAPTATION - Handled by shared/mobile_responsive.css */

        /* FICHE OVERLAY */
        #fiche-overlay {
            position: fixed;
            inset: 0;
            background: var(--dark-bg);
            z-index: 5000;
            display: none;
            flex-direction: column;
            overflow-y: auto;
        }

        .fiche-content {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .close-fiche:hover { background: #ff5252 !important; border-color: #ff5252 !important; transform: rotate(90deg); }

        .fiche-header { 
            height: 450px; 
            border-radius: 20px; 
            overflow: hidden; 
            position: relative; 
            background: #000; 
            margin-bottom: 2rem; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .fiche-header img { width: 100%; height: 100%; object-fit: contain; }
        
        .slide-btn { 
            position: absolute; top:50%; transform:translateY(-50%); 
            background: var(--accent); color: #000; border:none; 
            width: 44px; height: 44px; cursor:pointer; border-radius:50%; 
            z-index: 10; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }

        #fiche-stats { 
            background: rgba(255,255,255,0.05); 
            padding: 20px 30px; 
            border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.05); 
            min-width: 300px;
            flex-shrink: 0;
        }
        #stats-list { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        #stats-list p { margin: 0; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        #stats-list p:last-child { border-bottom: none; padding-bottom: 0; }
        #stats-list span { text-align: right; font-weight: 600; opacity: 0.9; }
        b, strong { font-weight: 900; color: var(--accent); }

        /* FULLSCREEN LIGHTBOX */
        #lightbox { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: #000; 
            z-index: 9999; 
        }
        #lightbox-img { width: 100%; height: 100%; object-fit: contain; }
        .lb-close { z-index: 20000; }
        .lb-close:hover { background: #ff5252 !important; border-color: #ff5252 !important; transform: rotate(90deg); }
        .lb-close i { color: black !important; }
        .lb-arrow { 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            background: rgba(255,255,255,0.1); 
            border: none; 
            color: white; 
            padding: 2rem; 
            cursor: pointer; 
            font-size: 40px; 
            z-index: 10001;
        }
        .fs-btn { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            background: rgba(0,0,0,0.8); 
            color: var(--accent); 
            border: 1px solid var(--accent); 
            padding: 6px 12px; 
            border-radius: 20px; 
            cursor: pointer; 
            z-index: 10; 
            font-weight: 800; 
            font-size: 10px; 
            transition: 0.2s; 
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fs-btn:hover { background: var(--accent); color: #000; }
    </style>
</head>

    <!-- OVERLAY SCHEDA ANIMALE -->
    <div id="fiche-overlay">

                <i data-lucide="chevron-left"></i> CHIUDI
            </button>

                <h1 id="f-title" style="color:var(--accent); font-size:3.5rem; margin:0; font-weight:900; text-transform:uppercase; word-break: break-word; flex: 1; min-width: 250px;">TITOLO</h1>

    <script>
        lucide.createIcons();

        var library = { active_map_id: null, map_markers: [], available_maps: [] };

        function drawItineraryLines(waypoints) {
            const svg = document.getElementById('iti-lines');
            svg.innerHTML = '';
            if(!waypoints || waypoints.length < 2) return;
            
            let pointsHtml = '';
            for(let i=0; i<waypoints.length - 1; i++) {
                const m1 = library.map_markers.find(m => m.id == waypoints[i]);
                const m2 = library.map_markers.find(m => m.id == waypoints[i+1]);
                if(m1 && m2) {
                    // Draw a line. We also add a shadow line for better visibility
                    svg.innerHTML += `
                        <line x1="${m1.x}%" y1="${m1.y}%" x2="${m2.x}%" y2="${m2.y}%" stroke="black" stroke-width="6" opacity="0.5" />
                        <line x1="${m1.x}%" y1="${m1.y}%" x2="${m2.x}%" y2="${m2.y}%" stroke="var(--accent)" stroke-width="4" stroke-dasharray="8 8" class="iti-path-line" />
                    `;
                }
            }
        }

        function renderMap() {
            var mActive = (library.available_maps || []).find(m => m.id === library.active_map_id);
            if(mActive) { 
                document.getElementById('map-base').src = mActive.url; 
            } else { 
                document.getElementById('map-base').src = "../assets/library/MAPS/Etosha map 02.jpg"; 
            }
            
            var filtered = (library.map_markers || []).filter(m => m.mapId == library.active_map_id);
            document.getElementById('markers-layer').innerHTML = filtered.map(m => {
                // Determine label color/style based on type
                let labelStyle = "background:rgba(0,0,0,0.7); color:white; border:1px solid rgba(255,255,255,0.2);";
                if (m.type === 'alert') labelStyle = "background:rgba(0,0,0,0.7); color:white; border:1px solid var(--danger);";
                if (m.type === 'must_see') labelStyle = "background:rgba(0,0,0,0.7); color:white; border:1px solid #4caf50;";

                // Check if linkable
                let isLinked = !!m.ficheId;
                const mTitle = (m.title || "").trim().toUpperCase();
                let linkedItem = null;
                if(mTitle) {
                    [library, (typeof visitNamibia !== 'undefined' ? visitNamibia : {categories:[]})].forEach(db => {
                        (db.categories || []).forEach(c => (c.subcategories || []).forEach(s => {
                            const found = s.items.find(it => (it.name || "").trim().toUpperCase() === mTitle);
                            if(found) linkedItem = found;
                        }));
                    });
                }
                if(linkedItem) isLinked = true;
                
                let isAlertWithCard = false;
                if (m.type === 'alert') {
                    const iconDef = (library.available_icons && library.available_icons.alert ? library.available_icons.alert : []).find(i => i.url === m.icon || i.name === mTitle);
                    if (iconDef && iconDef.description) isAlertWithCard = true;
                }

                // VISIBILITY CHECK: If linked to an invisible item, hide marker
                if(linkedItem && linkedItem.isVisible === false) return '';

                let imgContainerStyle = "";
                if (isAlertWithCard) {
                    imgContainerStyle = "border: 3px solid #ff5252; border-radius: 8px; background: rgba(0,0,0,0.5); padding: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.6); cursor: pointer;";
                } else if (isLinked) {
                    imgContainerStyle = "border: 3px solid #ffeb3b; border-radius: 8px; background: rgba(0,0,0,0.5); padding: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.6); cursor: pointer;";
                } else {
                    imgContainerStyle = "padding: 4px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));";
                }
                
                // STAR for Must See items
                let starHtml = "";
                if(linkedItem && linkedItem.isMustSee) {
                    starHtml = '<i data-lucide="star" style="width:12px; height:12px; fill:#ffeb3b; color:#ffeb3b; margin-right:4px;"></i>';
                }
                
                return `
                    <div class="marker-container marker-wrapper" data-id="${m.id}" style="position:absolute; left:${m.x}%; top:${m.y}%; transform:translate(-50%, -100%); display:flex; flex-direction:column; align-items:center; z-index:100;" onclick="handleMarkerClick(event, ${m.id})">
                        <div style="${imgContainerStyle} display:flex; align-items:center; justify-content:center; transition:0.2s;">
                            <img src="${m.icon}" style="width:50px; height:50px; object-fit:contain;">
                        </div>
                        <div style="${labelStyle} padding:3px 8px; border-radius:5px; font-size:11px; font-weight:800; margin-top:6px; white-space:nowrap; text-transform:uppercase; pointer-events:none; display:flex; align-items:center; box-shadow: 0 4px 8px rgba(0,0,0,0.5);">
                            ${starHtml}${m.title}
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function handleMarkerClick(e, id) {
            if(e) e.stopPropagation(); // Previeni che il click passi alla mappa sottostante
            const m = library.map_markers.find(x => x.id == id);
            if(!m) return;

            const mTitle = (m.title || "").trim().toUpperCase();

            // ALERT CARDS
            if (m.type === 'alert') {
                const iconDef = (library.available_icons && library.available_icons.alert ? library.available_icons.alert : []).find(i => i.url === m.icon || i.name === mTitle);
                if (iconDef && iconDef.description) {
                    activeItem = { name: m.title || iconDef.name, description: iconDef.description, photos: [iconDef.url], facts: {} };
                    itemImages = [iconDef.url];
                    slideIdx = 0;
                    document.getElementById('f-title').innerText = activeItem.name;
                    document.getElementById('f-desc').innerText = activeItem.description;
                    
                    // Modifiche dimensioni per ALERT
                    document.querySelector('.fiche-content').style.maxWidth = '500px';
                    document.querySelector('.fiche-header').style.height = '150px';
                    document.querySelector('.fiche-header').style.background = 'transparent';
                    document.querySelector('.fiche-header').style.border = 'none';
                    document.querySelector('.fiche-header img').style.filter = 'drop-shadow(0 10px 20px rgba(0,0,0,0.5))';
                    document.getElementById('f-title').style.fontSize = '2.5rem';
                    document.getElementById('f-title').style.textAlign = 'center';
                    document.getElementById('f-desc').style.textAlign = 'center';
                    document.querySelectorAll('.slide-btn').forEach(b => b.style.display = 'none');
                    
                    updateSlider();
                    document.getElementById('stats-list').innerHTML = '';
                    document.getElementById('fiche-stats').style.display = 'none';
                    document.getElementById('fiche-overlay').style.display = 'flex';
                    lucide.createIcons();
                    return;
                }
            }

            let ficheId = m.ficheId;
            
            // SMART FALLBACK: se non c'Ã¨ ficheId, prova a cercarlo per nome (titolo)
            if(!ficheId && mTitle) {
                // Check Library
                (library.categories || []).forEach(c => (c.subcategories || []).forEach(s => {
                    const it = s.items.find(i => (i.name || "").trim().toUpperCase() === mTitle);
                    if(it) ficheId = it.id;
                }));
                // Check Namibia
                if(!ficheId && typeof visitNamibia !== 'undefined') {
                    (visitNamibia.categories || []).forEach(c => (c.subcategories || []).forEach(s => {
                        const it = s.items.find(i => (i.name || "").trim().toUpperCase() === mTitle);
                        if(it) ficheId = it.id;
                    }));
                }
            }

            if(ficheId) {
                document.getElementById('fiche-stats').style.display = 'block';
                openFiche(ficheId);
            } else {
                showTooltip(e, m.title);
            }
        }

        let activeItem = null;
        let itemImages = [];
        let slideIdx = 0;

        function openFiche(ficheId) {
            // Cerca l'item in tutta la libreria e in Visit Namibia
            let found = null;
            [library, visitNamibia].forEach(db => {
                if(db && db.categories) {
                    db.categories.forEach(c => {
                        if(c.subcategories) {
                            c.subcategories.forEach(s => {
                                if(s.items) {
                                    const it = s.items.find(i => i.id == ficheId);
                                    if(it) found = it;
                                }
                            });
                        }
                    });
                }
            });

            if(!found) { alert("Scheda non trovata nella libreria."); return; }
            
            activeItem = found;
            itemImages = (activeItem.photos || []).filter(p => {
                return !((typeof p === 'object' && p.type === 'application/pdf') || (typeof p === 'string' && p.startsWith('data:application/pdf')));
            }).map(p => typeof p === 'object' ? p.url : p);

            slideIdx = 0;
            document.getElementById('f-title').innerText = activeItem.name;
            document.getElementById('f-desc').innerText = activeItem.description || "";
            document.getElementById('fiche-stats').style.display = 'block';
            
            var mapBtn = document.getElementById('map-btn-gps');
            if (activeItem.lat && activeItem.lng) {
                mapBtn.style.display = 'flex';
            } else {
                mapBtn.style.display = 'none';
            }

            // Ripristina dimensioni originali per SCHEDA ANIMALE
            document.querySelector('.fiche-content').style.maxWidth = '1000px';
            document.querySelector('.fiche-header').style.height = '450px';
            document.querySelector('.fiche-header').style.background = '#000';
            document.querySelector('.fiche-header').style.border = '1px solid rgba(255,255,255,0.1)';
            document.querySelector('.fiche-header img').style.filter = 'none';
            document.getElementById('f-title').style.fontSize = '3.5rem';
            document.getElementById('f-title').style.textAlign = 'left';
            document.getElementById('f-desc').style.textAlign = 'left';
            document.querySelectorAll('.slide-btn').forEach(b => b.style.display = 'flex');

            updateSlider();
            renderStats();
            
            const overlay = document.getElementById('fiche-overlay');
            overlay.style.display = 'flex';
            overlay.scrollTop = 0;
            
            // Set mobile title if exists
            const mobTitle = document.getElementById('mobile-fiche-title');
            if(mobTitle) mobTitle.innerText = activeItem.name.toUpperCase();
            
            // Ensure icons are created
            if(window.lucide) lucide.createIcons();
        }

        function updateSlider() {
            var src = itemImages[slideIdx] || "";
            document.getElementById('f-img').src = src;
            document.getElementById('lightbox-img').src = src;
            document.querySelector('.fiche-header').style.display = (itemImages.length > 0) ? 'block' : 'none';
        }

        function openFS() { document.getElementById('lightbox').style.display = 'block'; }
        function closeFS() { document.getElementById('lightbox').style.display = 'none'; }

        function nextSlide() { if(itemImages.length > 0) { slideIdx = (slideIdx + 1) % itemImages.length; updateSlider(); } }
        function prevSlide() { if(itemImages.length > 0) { slideIdx = (slideIdx - 1 + itemImages.length) % itemImages.length; updateSlider(); } }

        function renderStats() {
            const f = activeItem.facts || {};
            const statsContainer = document.getElementById('fiche-stats');
            
            // Determina la categoria per i label corretti
            let catName = "";
            [library, (typeof visitNamibia !== 'undefined' ? visitNamibia : {categories:[]})].forEach(db => {
                (db.categories || []).forEach(c => (c.subcategories || []).forEach(s => {
                    if(s.items.find(it => it.id === activeItem.id)) catName = (c.name || "").toUpperCase();
                }));
            });

            const isPeople = catName.includes("POPOLI") || catName.includes("PEOPLES") || catName.includes("GENTE") || catName.includes("POPOLAZIONI");
            const isFlora = catName.includes("FLORA") || catName.includes("PIANTE") || catName.includes("ALBERI") || catName.includes("PLANTS");
            const isCity = catName.includes("CITTÀ") || catName.includes("LOCALITÀ") || catName.includes("VILLAGGI") || catName.includes("CITIES") || catName.includes("TOWNS");
            const isGeo = catName.includes("GEOGRAFIA") || catName.includes("SITI") || catName.includes("LUOGHI") || catName.includes("FIUMI") || catName.includes("DESERTO") || catName.includes("PLACES");

            var l1 = f.label1, l2 = f.label2, l3 = f.label3;
            let d1 = "PESO", d2 = "DIMENSIONI", d3 = "LONGEVITÀ";
            
            if (isFlora) { d1 = "ALTEZZA"; d2 = "SPECIE"; d3 = "HABITAT"; }
            else if (isPeople) { d1 = "POPOLAZIONE"; d2 = "PERCENTUALE"; d3 = "AREA GEOGRAFICA"; }
            else if (isCity) { d1 = "POPOLAZIONE"; d2 = "SUPERFICIE"; d3 = "REGIONE"; }
            else if (isGeo) { d1 = "TIPOLOGIA"; d2 = "ESTENSIONE"; d3 = "INFO"; }

            if(!l1) l1 = d1; if(!l2) l2 = d2; if(!l3) l3 = d3;

            function fmt(val) {
                if (!val || val === '-') return '-';
                return String(val).trim()
                    .replace(/([\d])([a-zA-Z])/g, '$1 $2')
                    .replace(/\b(\d{4,})\b/g, m => m.replace(/\B(?=(\d{3})+(?!\d))/g, "."));
            }

            var v1 = f.weight || f.popolazione || "";
            var v2 = f.size || f.superficie || "";
            var v3 = f.life || f.regione || "";

            // Se non c'è proprio nulla, nascondiamo
            const hasAnyData = v1 || v2 || v3 || f.speed;
            if (!hasAnyData) {
                statsContainer.style.display = 'none';
                return;
            }
            statsContainer.style.display = 'block';

            let html = `
                <p><b>${l1}</b> <span>${fmt(v1)}</span></p>
                <p><b>${l2}</b> <span>${fmt(v2)}</span></p>
                <p><b>${l3}</b> <span>${fmt(v3)}</span></p>
            `;
            if (f.speed) { html += `<p><b>Velocità</b> <span>${fmt(f.speed)}</span></p>`; }
            document.getElementById('stats-list').innerHTML = html;
        }

        function closeFiche() {
            document.getElementById('fiche-overlay').style.display = 'none';
        }

        var mapInstance = null;
        function openMapModal() {
            document.getElementById('map-modal').style.display = 'flex';
            document.getElementById('map-modal-title').innerText = activeItem.name;
            
            setTimeout(() => {
                if (!mapInstance) {
                    mapInstance = L.map('map-container').setView([activeItem.lat, activeItem.lng], 13);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap'
                    }).addTo(mapInstance);
                } else {
                    mapInstance.setView([activeItem.lat, activeItem.lng], 13);
                }
                
                // Clear existing markers
                mapInstance.eachLayer((layer) => {
                    if (layer instanceof L.Marker) mapInstance.removeLayer(layer);
                });

                // Item marker
                L.marker([activeItem.lat, activeItem.lng], {
                    icon: L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div style="background:#ffab40; width:30px; height:30px; border-radius:50%; border:3px solid white; box-shadow:0 5px 15px rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; color:black;"><i data-lucide="star" style="width:16px; fill:black;"></i></div>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    })
                }).addTo(mapInstance).bindPopup(`<b>${activeItem.name}</b>`).openPopup();

                // User marker
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const userLat = pos.coords.latitude;
                        const userLng = pos.coords.longitude;
                        
                        L.marker([userLat, userLng], {
                            icon: L.divIcon({
                                className: 'custom-div-icon',
                                html: `<div style="background:#4caf50; width:30px; height:30px; border-radius:50%; border:3px solid white; box-shadow:0 5px 15px rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; color:white;"><i data-lucide="user" style="width:16px;"></i></div>`,
                                iconSize: [30, 30],
                                iconAnchor: [15, 15]
                            })
                        }).addTo(mapInstance).bindPopup("La tua posizione");
                        
                        // Fit bounds to show both
                        const bounds = L.latLngBounds([[activeItem.lat, activeItem.lng], [userLat, userLng]]);
                        mapInstance.fitBounds(bounds, { padding: [50, 50] });
                    });
                }
                
                lucide.createIcons();
                mapInstance.invalidateSize();
            }, 300);
        }

        function closeMapModal() {
            document.getElementById('map-modal').style.display = 'none';
        }

        function showTooltip(e, title) { 
            e.stopPropagation(); 
            var tt = document.getElementById('tooltip'); 
            document.getElementById('tt-title').innerText = title.toUpperCase(); 
            tt.style.left = e.target.style.left; 
            tt.style.top = e.target.style.top; 
            tt.style.display = 'block'; 
        }

        document.getElementById('map-viewport').onclick = function() { 
            document.getElementById('tooltip').style.display = 'none'; 
        }

        function logout() {
            window.PARKS_APP.setSession({ loggedIn: false }, function() {
                window.location.href = 'index.html';
            });
        }

        window.PARKS_APP.init(() => { 
            window.PARKS_APP.getSession(function(session) {
                if (!session || !session.loggedIn) {
                    window.location.href = 'index.html';
                }
            });

            // Carica entrambi i DB per permettere i collegamenti intelligenti
            window.PARKS_DB.get('parks_visit_namibia_v1', {categories:[]}, function(vData) {
                visitNamibia = vData;
                window.PARKS_DB.get('parks_library_v2', {categories:[]}, function(data) { 
                    if(data){
                        library = data; 
                        if(!library.available_maps) library.available_maps = [];
                    } 
                    
                    // Handle URL Params for deep linking
                    const params = new URLSearchParams(window.location.search);
                    const mapId = params.get('mapId');
                    const markerId = params.get('markerId');
                    const itiIdxStr = params.get('itiIdx');
                    
                    if(mapId) {
                        library.active_map_id = parseInt(mapId);
                    }
                    
                    renderMap();

                    if(itiIdxStr !== null) {
                        window.PARKS_DB.get('parks_itineraries', [], function(itiData) {
                            var iti = itiData[parseInt(itiIdxStr)];
                            if (iti && iti.waypoints && iti.waypoints.length > 0) {
                                drawItineraryLines(iti.waypoints);
                                setTimeout(() => {
                                    const firstId = iti.waypoints[0];
                                    const markerEl = document.querySelector(`.marker-wrapper[data-id="${firstId}"]`);
                                    if(markerEl) {
                                        markerEl.style.animation = 'pulse 2s infinite';
                                        markerEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                    }
                                }, 500);
                            }
                        });
                    } else if(markerId) {
                        setTimeout(() => {
                            const markerEl = document.querySelector(`.marker-wrapper[data-id="${markerId}"]`);
                            if(markerEl) {
                                markerEl.style.animation = 'pulse 2s infinite';
                                markerEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                markerEl.click();
                            }
                        }, 500);
                    }
                }); 
            });
        });
    </script>
    <style>
        .iti-path-line {
            animation: dash 20s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -1000; }
        }
        @keyframes pulse {
            0% { transform: scale(1) translate(-50%, -100%); filter: drop-shadow(0 0 0 var(--accent)); }
            50% { transform: scale(1.3) translate(-40%, -80%); filter: drop-shadow(0 0 30px var(--accent)); }
            100% { transform: scale(1) translate(-50%, -100%); filter: drop-shadow(0 0 0 var(--accent)); }
        }
    </style>
</body>
</html>
